name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          archive="wirecat-${tag}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${archive}" wirecat
          cd ../../..
          shasum -a 256 "${archive}" > "${archive}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wirecat-${{ matrix.target }}
          path: |
            wirecat-*.tar.gz
            wirecat-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wirecat-*.tar.gz
            wirecat-*.tar.gz.sha256

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wirecat
        uses: actions/checkout@v4

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: shonenada/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        shell: bash
        run: |
          scripts/generate-formula.sh "${GITHUB_REF_NAME}" > homebrew-tap/Formula/wirecat.rb

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap
          add-paths: Formula/wirecat.rb
          base: main
          branch: automation/update-wirecat-${{ github.ref_name }}
          delete-branch: true
          commit-message: Update wirecat formula to ${{ github.ref_name }}
          title: Update wirecat formula to ${{ github.ref_name }}
          body: |
            Update `Formula/wirecat.rb` to `${{ github.ref_name }}`.

            This change was generated by the release workflow in `shonenada-vibe/wirecat`.
